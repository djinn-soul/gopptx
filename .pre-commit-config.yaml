repos:
  - repo: local
    hooks:
      - id: go-fmt
        name: gofmt
        entry: gofmt
        language: system
        types: [go]

      - id: go-imports
        name: goimports
        entry: goimports
        language: system
        types: [go]

      - id: go-vet
        name: go vet
        entry: go
        language: system
        pass_filenames: false
        args: ["vet", "./..."]

      - id: golangci-lint
        name: golangci-lint
        entry: golangci-lint
        language: system
        pass_filenames: false
        args: ["run", "./..."]

      - id: go-mod-tidy
        name: go mod tidy
        entry: go
        language: system
        pass_filenames: false
        args: ["mod", "tidy"]

      - id: go-test
        name: go test
        entry: go
        language: system
        pass_filenames: false
        args: ["test", "./cmd/...", "./internal/...", "./pkg/..."]
