version: '3'

vars:
  GO_BRIDGE_SRC: bindings/c/bridge.go
  PYTHON_PKG_DIR: python/gopptx
  GO_ALLOWED_LICENSES: MIT,BSD-2-Clause,BSD-3-Clause,Apache-2.0,MPL-2.0,ISC
  LIB_NAME:
    sh: |
      case "$(go env GOOS)" in
        darwin) echo "libgopptx.dylib" ;;
        windows) echo "gopptx.dll" ;;
        *) echo "libgopptx.so" ;;
      esac

tasks:
  default:
    desc: Build and test everything
    deps: [test]

  build:go:
    desc: Build Go bridge for Python
    sources:
      - 'bindings/c/**/*.go'
      - 'pkg/**/*.go'
      - 'internal/**/*.go'
      - go.mod
      - go.sum
    generates:
      - '{{.PYTHON_PKG_DIR}}/{{.LIB_NAME}}'
    cmds:
      - |
        if [ "${GOPPTX_RELEASE_BUILD}" = "1" ] || [ "${GOPPTX_RELEASE_BUILD}" = "true" ]; then
          go build -trimpath -buildvcs=false -ldflags="-s -w" -o {{.PYTHON_PKG_DIR}}/{{.LIB_NAME}} -buildmode=c-shared {{.GO_BRIDGE_SRC}}
        else
          go build -o {{.PYTHON_PKG_DIR}}/{{.LIB_NAME}} -buildmode=c-shared {{.GO_BRIDGE_SRC}}
        fi

  setup:python:
    desc: Setup Python environment using uv
    sources:
      - pyproject.toml
    generates:
      - .venv/pyvenv.cfg
    cmds:
      - uv venv
      - uv pip install -e .[dev]

  test:go:
    desc: Run Go unit tests
    cmds:
      - go test ./pkg/... ./internal/...

  test:python:
    desc: Run Python tests
    deps: [build:go, setup:python]
    cmds:
      - uv run python -c "import gopptx; print('Python package imported successfully')"

  test:
    desc: Run all tests
    deps: [test:go, test:python]

  lint:
    desc: Run all linters
    cmds:
      - golangci-lint run ./...
      - uv run basedpyright
      - task check:go-licenses

  check:go-licenses:
    desc: Validate licenses for direct Go dependencies
    cmds:
      - go run github.com/google/go-licenses/v2@latest check ./... --allowed_licenses={{.GO_ALLOWED_LICENSES}}

  docs:serve:
    desc: Serve MkDocs Material docs on http://localhost:8000 (Docker)
    cmds:
      - docker run --rm -it -p 8000:8000 -v "{{.USER_WORKING_DIR}}:/docs" squidfunk/mkdocs-material:9.7.5 serve -a 0.0.0.0:8000

  docs:build:
    desc: Build MkDocs Material docs strictly (Docker)
    cmds:
      - docker run --rm -v "{{.USER_WORKING_DIR}}:/docs" squidfunk/mkdocs-material:9.7.5 build --strict
