site_name: gopptx
site_description: High-performance PowerPoint engine for Go and Python
site_url: https://djinn-soul.github.io/gopptx
repo_url: https://github.com/djinn-soul/gopptx
repo_name: djinn-soul/gopptx

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.expand
    - navigation.top
    - navigation.footer
    - content.code.copy
    - search.suggest
    - search.highlight
    - toc.follow

extra_css:
  - styles/monochrome.css

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [python]
          options:
            show_source: false
            show_signature_annotations: true
            show_root_heading: true
            show_root_full_path: false
            members_order: source
            inherited_members: true
            show_bases: true
            merge_init_into_class: true
            docstring_style: google

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

