version: "2"

issues:
  max-same-issues: 50

formatters:
  enable:
    - goimports
    - golines
  settings:
    goimports:
      local-prefixes:
        - github.com/djinn-soul/gopptx
    golines:
      max-len: 120

linters:
  disable: []

  enable:
    - asasalint
    - asciicheck
    - bidichk
    - bodyclose
    - canonicalheader
    - copyloopvar
    - cyclop
    - depguard
    - dupl
    - durationcheck
    - embeddedstructfieldcheck
    - errcheck
    - errname
    - errorlint
    - exhaustive
    - exptostd
    - fatcontext
    - forbidigo
    - funcorder
    - funlen
    - gocheckcompilerdirectives
    - gochecknoglobals
    - gochecknoinits
    - gochecksumtype
    - gocognit
    - goconst
    - gocritic
    - gocyclo
    - godot
    - gomoddirectives
    - goprintffuncname
    - gosec
    - govet
    - iface
    - ineffassign
    - intrange
    - iotamixing
    - loggercheck
    - makezero
    - mirror
    - mnd
    - modernize
    - musttag
    - nakedret
    - nestif
    - nilerr
    - nilnesserr
    - nilnil
    - noctx
    - nolintlint
    - nonamedreturns
    - nosprintfhostport
    - perfsprint
    - predeclared
    - promlinter
    - protogetter
    - reassign
    - recvcheck
    - revive
    - rowserrcheck
    - sloglint
    - spancheck
    - sqlclosecheck
    - staticcheck
    - testableexamples
    - testifylint
    - tparallel
    - unconvert
    - unparam
    - unqueryvet
    - unused
    - usestdlibvars
    - usetesting
    - wastedassign
    - whitespace

  settings:
    cyclop:
      max-complexity: 30
      package-average: 10.0

    depguard:
      rules:
        deprecated:
          files:
            - "$all"
          deny:
            - pkg: github.com/golang/protobuf
              desc: Use google.golang.org/protobuf instead.
            - pkg: github.com/satori/go.uuid
              desc: Use github.com/google/uuid instead.
            - pkg: github.com/gofrs/uuid$
              desc: Use github.com/gofrs/uuid/v5 or later.
            - pkg: github.com/djinn-soul/gopptx/pkg/gopptx
              desc: Removed legacy facade. Use github.com/djinn-soul/gopptx/pkg/pptx instead.
        non-test-files:
          files:
            - "!$test"
          deny:
            - pkg: math/rand$
              desc: Use math/rand/v2 instead.
        non-main-files:
          files:
            - "!**/main.go"
          deny:
            - pkg: log$
              desc: Use log/slog instead.

    embeddedstructfieldcheck:
      forbid-mutex: true

    errcheck:
      check-type-assertions: true

    exhaustive:
      check:
        - switch
        - map
      default-signifies-exhaustive: true

    exhaustruct:
      exclude:
        - ^net/http.Client$
        - ^net/http.Cookie$
        - ^net/http.Request$
        - ^net/http.Response$
        - ^net/http.Server$
        - ^net/http.Transport$
        - ^net/url.URL$
        - ^os/exec.Cmd$
        - ^reflect.StructField$
        - ^github.com/Shopify/sarama.Config$
        - ^github.com/Shopify/sarama.ProducerMessage$
        - ^github.com/mitchellh/mapstructure.DecoderConfig$
        - ^github.com/prometheus/client_golang/.+Opts$
        - ^github.com/spf13/cobra.Command$
        - ^github.com/spf13/cobra.CompletionOptions$
        - ^github.com/stretchr/testify/mock.Mock$
        - ^github.com/testcontainers/testcontainers-go.+Request$
        - ^github.com/testcontainers/testcontainers-go.FromDockerfile$
        - ^golang.org/x/tools/go/analysis.Analyzer$
        - ^google.golang.org/protobuf/.+Options$
        - ^gopkg.in/yaml.v3.Node$
      allow-empty-returns: true

    funcorder:
      struct-method: false

    funlen:
      lines: 100
      statements: 50

    gochecksumtype:
      default-signifies-exhaustive: false

    gocognit:
      min-complexity: 20

    gocritic:
      settings:
        captLocal:
          paramsOnly: false
        underef:
          skipRecvDeref: false

    govet:
      enable-all: true
      disable:
        - fieldalignment
      settings:
        shadow:
          strict: true

    inamedparam:
      skip-single-param: true

    mnd:
      ignored-numbers:
        - "2"
      ignored-functions:
        - args.Error
        - flag.Arg
        - flag.Duration.*
        - flag.Float.*
        - flag.Int.*
        - flag.Uint.*
        - os.Chmod
        - os.Mkdir.*
        - os.OpenFile
        - os.WriteFile
        - prometheus.ExponentialBuckets.*
        - prometheus.LinearBuckets

    nakedret:
      max-func-lines: 0

    nolintlint:
      allow-no-explanation:
        - funlen
        - gocognit
        - golines
      require-explanation: true
      require-specific: true

    perfsprint:
      strconcat: false

    reassign:
      patterns:
        - ".*"

    rowserrcheck:
      packages:
        - github.com/jmoiron/sqlx

    sloglint:
      no-global: all
      context: scope

    staticcheck:
      checks:
        - all
        - -ST1000
        - -ST1016
        - -QF1008

    usetesting:
      os-temp-dir: true

  exclusions:
    warn-unused: true
    presets:
      - std-error-handling
      - common-false-positives
    rules:
      - source: "TODO"
        linters: [godot]
      - text: "should have a package comment"
        linters: [revive]
      - text: "avoid meaningless package names"
        linters: [revive]
      - text: 'exported \S+ \S+ should have comment( \(or a comment on this block\))? or be unexported'
        linters: [revive]
      - text: 'package comment should be of the form ".+"'
        source: "// ?(nolint|TODO)"
        linters: [revive]
      - text: 'comment on exported \S+ \S+ should be of the form ".+"'
        source: "// ?(nolint|TODO)"
        linters: [revive, staticcheck]
      - text: "^shadow: declaration of"
        linters: [govet]
      - path: '_test\.go'
        linters:
          - bodyclose
          - dupl
          - errcheck
          - funlen
          - gocognit
          - goconst
          - gosec
          - noctx
          - testpackage
          - wrapcheck
      - path: "examples/.*"
        linters:
          - mnd
      - path: "pkg/pptx/mermaid/.*"
        linters:
          - mnd

      # G703 (path traversal via taint analysis) on operator-supplied output
      # paths. In a CLI, a build-time generator, or a library export function,
      # the caller choosing where their own file is written IS the feature:
      # the path is supplied by the operator running the process with their own
      # privileges, so no trust boundary is crossed. Adding path restrictions
      # here would break legitimate absolute-path output without closing a hole.
      #
      # Scoped to these paths on purpose rather than disabling G703 globally.
      # A real path-traversal boundary does exist in this codebase - archive
      # entry names written to disk (zip-slip) - and is guarded explicitly in
      # pkg/pptx/tplx/tplx_archive.go. Keeping G703 enabled everywhere else
      # means a new occurrence of that pattern still fails the build.
      - path: "cmd/.*"
        text: "G703"
        linters:
          - gosec
      - path: "examples/.*"
        text: "G703"
        linters:
          - gosec

      # cgo-generated code in the C bindings. golangci-lint analyses the
      # cgo-processed translation unit, so it reports findings that have no
      # corresponding source line in bindings/c/bridge.go:
      #
      #   * nakedret / nonamedreturns / ST1003 originate in _cgo_gotypes.go,
      #     a file cgo synthesises at build time (_cgo_cmalloc, the
      #     __cgofn__cgo_<hash>_Cfunc__Cmalloc vars). It is not in the repo,
      #     so there is nothing to edit. The <hash> is build-context derived
      #     and changes between runs.
      #
      #   * gocritic commentFormatting fires on Go directives - //export,
      #     //line, //go:linkname - where the absence of a space is REQUIRED.
      #     Writing "// export deck_save" does not fail the build; it silently
      #     demotes the directive to a plain comment, dropping the symbol from
      #     the shared library and breaking the Python FFI at runtime.
      #
      # These are excluded rather than fixed because no correct source edit
      # exists. Other linters remain active on bindings/c so hand-written code
      # in that package is still checked.
      - path: "bindings/c/.*"
        linters:
          - gocritic
          - nakedret
          - nonamedreturns
          - staticcheck
        text: "commentFormatting|naked return|named return|ST1003"
    paths:
      - issues
