# GoReleaser config — builds + publishes the `pptcli` binary on tag push.
# Driven by .github/workflows/release-go.yml. Local dry run: `goreleaser release --snapshot --clean`.
version: 2

project_name: gopptx

before:
  hooks:
    - go mod download

builds:
  - id: pptcli
    main: ./cmd/pptcli
    binary: pptcli
    env:
      - CGO_ENABLED=0          # pptcli is pure Go; cgo only lives in bindings/c
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w

archives:
  - id: pptcli
    ids:
      - pptcli
    name_template: "pptcli_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - "Merge pull request"
      - "Merge branch"

release:
  draft: false
  prerelease: auto              # tags like v0.1.0-rc.1 -> marked pre-release
  name_template: "{{ .Tag }}"
