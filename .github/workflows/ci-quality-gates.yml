name: CI Quality Gates

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

concurrency:
  group: ci-quality-gates-${{ github.ref }}
  cancel-in-progress: true

jobs:
  guardrails:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run architectural guardrails
        run: python3 scripts/ci/architectural_guardrails.py

  prek-all-files:
    needs: [guardrails]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Python
        id: setup-python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Restore pre-commit environments cache
        id: precommit-cache-restore
        uses: actions/cache/restore@v4
        with:
          path: ${{ github.workspace }}/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-py${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: pre-commit-${{ runner.os }}-

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.8.0
          install-mode: binary
          skip-save-cache: true

      - name: Sync dev dependencies
        run: uv sync --extra dev

      - name: Run full pre-commit gate
        env:
          PRE_COMMIT_HOME: ${{ github.workspace }}/.cache/pre-commit
        run: uv run prek run --all-files

      - name: Save pre-commit environments cache
        if: always() && steps.precommit-cache-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ github.workspace }}/.cache/pre-commit
          key: ${{ steps.precommit-cache-restore.outputs.cache-primary-key }}

  go-fuzz:
    needs: [guardrails]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run bounded fuzzing (internal/pptxxml)
        run: |
          for target in FuzzEscape FuzzContentTypes FuzzSectionListXML FuzzPresentation FuzzEmbeddedFontsXML FuzzRichTextRun; do
            go test ./internal/pptxxml -run=^$ -fuzz="^${target}$" -fuzztime=5s
          done

  go-vulncheck:
    needs: [guardrails]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck $(go list ./... | grep -v 'bindings/c')

  # CI license gate is intentionally centralized in dependency-review to avoid duplicate
  # failures/noise. Local explicit license validation is still available via:
  # `task check:go-licenses` (google/go-licenses).
  dependency-review:
    # Enable only when repository support is confirmed.
    # Set repository variable ENABLE_DEPENDENCY_REVIEW=true to turn this on.
    if: github.event_name == 'pull_request' && vars.ENABLE_DEPENDENCY_REVIEW == 'true'
    needs: [guardrails]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency Review (licenses + vulnerabilities)
        uses: actions/dependency-review-action@v4
        with:
          config-file: ./.github/dependency-review-config.yml

  semgrep:
    needs: [guardrails]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Cache semgrep
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: semgrep-${{ runner.os }}-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: semgrep-${{ runner.os }}-

      - name: Install Semgrep
        run: python -m pip install --upgrade semgrep

      - name: Run Semgrep scan
        run: |
          semgrep --config=auto --error \
            --exclude=.venv \
            --exclude=scripts/tools/PptxValidator/bin \
            --exclude=scripts/tools/PptxValidator/obj

  python-coverage:
    needs: [guardrails]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build Go shared library
        run: go build -o python/gopptx/libgopptx.so -buildmode=c-shared ./bindings/c/bridge.go

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Sync dev dependencies
        run: uv sync --extra dev

      - name: Run Python coverage gate
        run: |
          uv run pytest python/tests \
            --cov=python/gopptx \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=50

  go-coverage:
    needs: [guardrails]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run Go coverage gate
        shell: bash
        run: |
          pkgs=$(go list ./... | grep -v 'bindings/c')
          go test $pkgs -coverprofile=coverage-go.out -covermode=atomic -count=1
          total="$(go tool cover -func=coverage-go.out | awk '/^total:/ {gsub("%","",$3); print $3}')"
          echo "Total Go coverage: ${total}%"
          min_cov=50
          awk -v t="$total" -v m="$min_cov" 'BEGIN { exit !(t+0 >= m+0) }' || {
            echo "Go coverage ${total}% is below required ${min_cov}%"
            exit 1
          }
