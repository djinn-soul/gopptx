name: CI Quality Gates

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

concurrency:
  group: ci-quality-gates-${{ github.ref }}
  cancel-in-progress: true

jobs:
  guardrails:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0

      - name: Run architectural guardrails
        run: python3 scripts/ci/architectural_guardrails.py

  prek-all-files:
    needs: [guardrails]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Python
        id: setup-python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3.2.4
        with:
          enable-cache: true

      - name: Cache prek home
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.cache/prek
          key: prek-home-${{ runner.os }}-py${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: prek-home-${{ runner.os }}-

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 # v8.0.0
        with:
          version: v2.8.0
          install-mode: binary
          skip-save-cache: true

      - name: Sync dev dependencies
        run: uv sync --extra dev

      - name: Run full pre-commit gate
        uses: j178/prek-action@0bb87d7f00b0c99306c8bcb8b8beba1eb581c037 # v1.1.1

  go-fuzz:
    needs: [guardrails]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Run bounded fuzzing (internal/pptxxml)
        run: |
          for target in FuzzEscape FuzzContentTypes FuzzSectionListXML FuzzPresentation FuzzEmbeddedFontsXML FuzzRichTextRun; do
            go test ./internal/pptxxml -run=^$ -fuzz="^${target}$" -fuzztime=8s
          done

  go-vulncheck:
    needs: [guardrails]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck $(go list ./... | grep -v 'bindings/c')

  # CI license gate is intentionally centralized in dependency-review to avoid duplicate
  # failures/noise. Local explicit license validation is still available via:
  # `task check:go-licenses` (google/go-licenses).
  dependency-review:
    # Enable only when repository support is confirmed.
    # Set repository variable ENABLE_DEPENDENCY_REVIEW=true to turn this on.
    if: github.event_name == 'pull_request' && vars.ENABLE_DEPENDENCY_REVIEW == 'true'
    needs: [guardrails]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0

      - name: Dependency Review (licenses + vulnerabilities)
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          config-file: ./.github/dependency-review-config.yml

  semgrep:
    needs: [guardrails]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Cache semgrep
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.cache/pip
          key: semgrep-${{ runner.os }}-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: semgrep-${{ runner.os }}-

      - name: Install Semgrep
        run: python -m pip install --upgrade semgrep

      - name: Run Semgrep scan
        run: |
          semgrep --config=auto --error \
            --exclude=.venv \
            --exclude=scripts/tools/PptxValidator/bin \
            --exclude=scripts/tools/PptxValidator/obj

  python-coverage:
    needs: [guardrails]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Build Go shared library
        run: go build -o python/gopptx/libgopptx.so -buildmode=c-shared ./bindings/c/bridge.go

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3.2.4
        with:
          enable-cache: true

      - name: Sync dev dependencies
        run: uv sync --extra dev

      - name: Run Python coverage gate
        run: |
          uv run pytest python/tests \
            --cov=python/gopptx \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=50

  go-coverage:
    needs: [guardrails]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Run Go coverage gate
        shell: bash
        run: |
          pkgs=$(go list ./... | grep -v 'bindings/c')
          go test $pkgs -coverprofile=coverage-go.out -covermode=atomic -count=1
          total="$(go tool cover -func=coverage-go.out | awk '/^total:/ {gsub("%","",$3); print $3}')"
          echo "Total Go coverage: ${total}%"
          min_cov=50
          awk -v t="$total" -v m="$min_cov" 'BEGIN { exit !(t+0 >= m+0) }' || {
            echo "Go coverage ${total}% is below required ${min_cov}%"
            exit 1
          }
